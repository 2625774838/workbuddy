<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作台</title>
<style>
/* ============================================================
   DESIGN TOKENS
============================================================ */
:root {
  --bg: #f0f2f5;
  --bg-card: #ffffff;
  --bg-hover: #f7f8fa;
  --border: #e4e6eb;
  --border-light: #eef0f4;
  --text: #1a1d23;
  --text-secondary: #5c6370;
  --text-tertiary: #9399a6;
  --accent: #4f6ef7;
  --accent-hover: #3d5ce8;
  --accent-light: rgba(79,110,247,0.09);
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
  --yellow: #eab308;
  --teal: #14b8a6;
  --pink: #ec4899;
  --purple: #a855f7;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius-xs: 5px;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --sidebar-w: 220px;
  --sidebar-collapsed-w: 60px;
  --topbar-h: 52px;
  --font: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Dark mode */
body.dark {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-hover: #1f2235;
  --border: #2a2d3e;
  --border-light: #22263a;
  --text: #e8eaf0;
  --text-secondary: #8b92a9;
  --text-tertiary: #4a5168;
  --accent-light: rgba(79,110,247,0.15);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
}

/* ============================================================
   LOGIN SCREEN
============================================================ */
#loginScreen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #0f1117 100%);
  z-index: 9999;
}
#loginScreen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 30%, rgba(79,110,247,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 400px 600px at 80% 70%, rgba(168,85,247,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.login-box {
  position: relative;
  background: rgba(26,29,39,0.9);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px;
  width: 400px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .logo-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin-bottom: 12px;
  box-shadow: 0 8px 24px rgba(79,110,247,0.4);
}
.login-logo h1 {
  font-size: 22px; font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
}
.login-logo p {
  font-size: 13px; color: rgba(255,255,255,0.4);
  margin-top: 4px;
}
.login-label {
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.login-roles {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 8px; margin-bottom: 24px;
}
.role-btn {
  padding: 10px 4px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  font-size: 11px;
  text-align: center;
  transition: all var(--transition);
  font-family: var(--font);
}
.role-btn .role-icon { font-size: 18px; display: block; margin-bottom: 4px; }
.role-btn:hover { border-color: rgba(79,110,247,0.5); color: rgba(255,255,255,0.8); background: rgba(79,110,247,0.1); }
.role-btn.selected {
  border-color: var(--accent);
  background: rgba(79,110,247,0.2);
  color: #fff;
  box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
}
.login-input-wrap { position: relative; margin-bottom: 16px; }
.login-input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  transition: all var(--transition);
  letter-spacing: 2px;
}
.login-input::placeholder { letter-spacing: 0; color: rgba(255,255,255,0.25); }
.login-input:focus { border-color: var(--accent); background: rgba(79,110,247,0.1); box-shadow: 0 0 0 3px rgba(79,110,247,0.15); }
.login-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 4px 16px rgba(79,110,247,0.4);
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(79,110,247,0.5); }
.login-btn:active { transform: translateY(0); }
.login-err {
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-xs);
  color: #fca5a5;
  font-size: 13px;
  text-align: center;
  display: none;
}
.login-err.show { display: block; }

/* ============================================================
   APP LAYOUT
============================================================ */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

/* ============================================================
   SIDEBAR
============================================================ */
.app-body { display: flex; flex: 1; overflow: hidden; }

.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width var(--transition);
  overflow: hidden;
  z-index: 50;
}
.sidebar.collapsed { width: var(--sidebar-collapsed-w); }

.sidebar-header {
  display: flex; align-items: center;
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border-light);
  gap: 10px;
  min-height: 56px;
}
.sidebar-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.sidebar-title {
  font-size: 15px; font-weight: 700;
  white-space: nowrap; overflow: hidden;
  color: var(--text);
  flex: 1;
}
.sidebar-collapse-btn {
  width: 28px; height: 28px;
  border: none; background: transparent;
  border-radius: var(--radius-xs);
  cursor: pointer;
  color: var(--text-tertiary);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.sidebar-collapse-btn:hover { background: var(--bg); color: var(--text-secondary); }
.sidebar-collapse-btn svg { width: 16px; height: 16px; transition: transform var(--transition); }
.sidebar.collapsed .sidebar-collapse-btn svg { transform: rotate(180deg); }

.sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; overflow-x: hidden; }
.nav-item {
  display: flex; align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text-secondary);
  white-space: nowrap;
  margin-bottom: 2px;
  border: none; background: transparent;
  width: 100%;
  font-family: var(--font);
  font-size: 14px;
  text-align: left;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-item .nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.sidebar.collapsed .nav-label { display: none; }
.sidebar.collapsed .nav-item { justify-content: center; padding: 10px; }

.sidebar-footer {
  padding: 8px;
  border-top: 1px solid var(--border-light);
}
.user-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  cursor: default;
  overflow: hidden;
}
.user-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; overflow: hidden; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
.sidebar.collapsed .user-info { display: none; }
.sidebar.collapsed .user-card { justify-content: center; }

/* ============================================================
   MAIN CONTENT
============================================================ */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ============================================================
   TOPBAR
============================================================ */
.topbar {
  height: var(--topbar-h);
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 40;
}
.topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }

/* Storage status pill */
.storage-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}
.storage-pill:hover { border-color: var(--accent); color: var(--accent); }
.storage-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); }
.storage-dot.connected { background: var(--green); }
.storage-dot.warning { background: var(--orange); }

/* Theme toggle */
.icon-btn {
  width: 34px; height: 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

.logout-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px; font-family: var(--font);
  cursor: pointer;
  transition: all var(--transition);
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* ============================================================
   MODULE AREA
============================================================ */
.modules { flex: 1; overflow-y: auto; padding: 24px; }
.module { display: none; }
.module.active { display: block; }

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  padding: 7px 14px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-size: 13px; font-family: var(--font);
  cursor: pointer;
  transition: all var(--transition);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-hover); color: #fff; border-color: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text); border-color: transparent; }
.btn[disabled] { opacity: 0.4; pointer-events: none; }

/* ============================================================
   CARDS
============================================================ */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-light);
}
.card-title { font-size: 15px; font-weight: 600; }
.card-body { padding: 20px; }

/* ============================================================
   DASHBOARD
============================================================ */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card:hover { box-shadow: var(--shadow); }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.stat-card.blue::before { background: var(--accent); }
.stat-card.green::before { background: var(--green); }
.stat-card.orange::before { background: var(--orange); }
.stat-card.purple::before { background: var(--purple); }
.stat-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
  font-size: 18px;
}
.stat-card.blue .stat-icon { background: rgba(79,110,247,0.1); }
.stat-card.green .stat-icon { background: rgba(34,197,94,0.1); }
.stat-card.orange .stat-icon { background: rgba(249,115,22,0.1); }
.stat-card.purple .stat-icon { background: rgba(168,85,247,0.1); }
.stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

.dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 900px) { .dash-row { grid-template-columns: 1fr; } }

.today-card {
  background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
  border-radius: var(--radius);
  padding: 20px;
  color: #fff;
  margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.today-left { flex: 1; }
.today-date { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
.today-greeting { font-size: 20px; font-weight: 700; }
.today-sub { font-size: 13px; opacity: 0.75; margin-top: 4px; }
.today-stats { display: flex; gap: 20px; }
.today-stat { text-align: center; }
.today-stat-num { font-size: 24px; font-weight: 700; }
.today-stat-lbl { font-size: 11px; opacity: 0.75; }

/* ============================================================
   CALENDAR
============================================================ */
.cal-layout { display: flex; gap: 16px; }
.cal-left { flex-shrink: 0; }
.cal-right { flex: 1; min-width: 0; }
.cal-months { display: flex; gap: 12px; }
.cal-month-wrap {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-width: 240px;
}
.cal-month-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.cal-month-title { font-size: 14px; font-weight: 600; }
.cal-nav { display: flex; align-items: center; gap: 4px; }
.cal-nav-btn {
  width: 26px; height: 26px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: var(--radius-xs);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--text-secondary);
  transition: all var(--transition);
}
.cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.cal-today-btn {
  padding: 3px 8px; font-size: 11px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: var(--radius-xs);
  cursor: pointer;
  color: var(--text-secondary);
  font-family: var(--font);
  transition: all var(--transition);
}
.cal-today-btn:hover { border-color: var(--accent); color: var(--accent); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-weekday { text-align: center; font-size: 10px; color: var(--text-tertiary); padding: 3px 0; }
.cal-day {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding-top: 3px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  position: relative;
  transition: background var(--transition);
  border: 2px solid transparent;
  font-size: 12px;
}
.cal-day:hover { background: var(--bg-hover); }
.cal-day.other-month { color: var(--text-tertiary); }
.cal-day.today { border-color: var(--accent); background: var(--accent-light); font-weight: 600; }
.cal-day.selected { background: var(--accent-light); }
.cal-day-num { font-size: 12px; line-height: 1; }
.cal-day-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 28px; margin-top: 1px; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }
.cal-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-light); }
.cal-filter-item {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 11px;
  background: var(--bg-card);
  transition: all var(--transition);
  color: var(--text-secondary);
}
.cal-filter-item:hover { border-color: var(--accent); }
.cal-filter-item.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

/* Toolbar for admin: class filter */
.cal-class-filter {
  display: flex; gap: 6px; align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border-light);
  background: var(--bg-hover);
  flex-wrap: wrap;
}
.class-tag {
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 12px;
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: all var(--transition);
  font-family: var(--font);
}
.class-tag:hover { border-color: var(--accent); }
.class-tag.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }

.daily-schedule {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.daily-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
}
.daily-title { font-size: 14px; font-weight: 600; }
.daily-date { font-size: 12px; color: var(--text-secondary); }
.time-axis-wrap {
  position: relative;
  overflow-y: auto;
  border-radius: 0;
}
.time-axis-row {
  display: flex; height: 48px; position: relative;
}
.time-axis-row::after {
  content: '';
  position: absolute;
  left: 52px; right: 0; bottom: 0;
  border-bottom: 1px dashed var(--border-light);
}
.time-axis-row:last-child::after { border-bottom: none; }
.time-axis-label {
  width: 52px; flex-shrink: 0;
  font-size: 10px; color: var(--text-tertiary);
  text-align: right; padding-right: 10px; padding-top: 4px;
  font-variant-numeric: tabular-nums;
}
.time-axis-slot { flex: 1; position: relative; cursor: pointer; }
.time-axis-slot:hover { background: var(--accent-light); }
.time-axis-event {
  position: absolute; left: 4px; right: 8px;
  border-radius: var(--radius-xs);
  padding: 3px 8px;
  font-size: 11px; overflow: hidden;
  cursor: pointer; z-index: 2;
  border-left: 3px solid;
  box-shadow: var(--shadow-sm);
  line-height: 1.3;
}
.time-axis-event-title { font-weight: 600; }
.time-axis-event-time { opacity: 0.75; font-size: 10px; }
.time-axis-now-line {
  position: absolute; left: 52px; right: 0;
  height: 2px; background: var(--red);
  z-index: 3;
}
.time-axis-now-line::before {
  content: '';
  position: absolute; left: -4px; top: -4px;
  width: 10px; height: 10px;
  border-radius: 50%; background: var(--red);

.gantt-wrap { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; box-shadow: var(--shadow-sm); }

.note-editor-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.nep-title::placeholder { color: var(--text-tertiary); }
.editor-toolbar { display: flex; gap: 2px; padding: 5px 12px; border-bottom: 1px solid var(--border-light); flex-wrap: wrap; align-items: center; background: var(--bg-hover); flex-shrink: 0; }

.rich-editor { width: 100%; min-height: 400px; height: 100%; border: none; outline: none; font-size: 14px; line-height: 1.8; color: var(--text); padding: 12px 16px; overflow-y: auto; word-break: break-word; }

/* ============================================================

============================================================ */

.lightbox-close:hover { background: rgba(255,255,255,0.2); }

/* ============================================================

============================================================ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg-card); border-radius: var(--radius-lg); width: 520px; max-width: 90vw; max-height: 85vh; overflow: hidden; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; border: 1px solid var(--border); }

.form-input, .form-select, .form-textarea {

  background: var(--bg-card); color: var(--text);

.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ============================================================
   TOAST
============================================================ */
.toast-container { position: fixed; top: 64px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
.toast { padding: 11px 16px; border-radius: var(--radius-sm); background: var(--text); color: var(--bg-card); font-size: 13px; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; max-width: 300px; pointer-events: auto; display: flex; align-items: center; gap: 8px; }

.toast.error { background: var(--red); color: #fff; }

@keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }

/* ============================================================
   TOOLTIP
============================================================ */

/* ============================================================
   EMPTY STATE
============================================================ */

   SCROLLBAR
============================================================ */

::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

   MISC
============================================================ */

<script>
'use strict';
// ============================================================
//  AUTH & PERMISSIONS
// ============================================================
// ⚠️  密码存储在代码里，上线前请修改为你自己的密码
//     后续接入 Supabase 后这里会改为云端验证
const ROLES = {
  admin:   { pwd: 'admin888',   label: '管理员', color: '#4f6ef7', icon: '👨‍💼', readonly: false },
  grade7:  { pwd: 'g7pass',     label: '七年级', color: '#22c55e', icon: '📗', readonly: true, classFilter: 'grade7' },
  grade8:  { pwd: 'g8pass',     label: '八年级', color: '#3b82f6', icon: '📘', readonly: true, classFilter: 'grade8' },
  grade9:  { pwd: 'g9pass',     label: '九年级', color: '#ef4444', icon: '📕', readonly: true, classFilter: 'grade9' },
  evening: { pwd: 'eve888',     label: '晚托班', color: '#a855f7', icon: '🌙', readonly: true, classFilter: 'evening' }
};

let currentRole = null;  // key into ROLES
let isReadonly = false;

function selectRole(btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('loginPwd').focus();
}

function doLogin() {
  try {
    const roleBtn = document.querySelector('.role-btn.selected');
    if (!roleBtn) { showLoginErr('请先选择身份'); return; }
    const role = roleBtn.dataset.role;
    const pwd = document.getElementById('loginPwd').value;
    if (!ROLES[role]) { showLoginErr('身份无效'); return; }
    if (pwd !== ROLES[role].pwd) { showLoginErr('密码错误，请重试'); return; }

    currentRole = role;
    isReadonly = ROLES[role].readonly;
    const r = ROLES[role];
    const isAdmin = !isReadonly;

    // Hide login, show app
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // Apply user info
    const avatarEl = document.getElementById('userAvatar');
    if (avatarEl) { avatarEl.textContent = r.icon; avatarEl.style.background = r.color; }
    const nameEl = document.getElementById('userName');
    if (nameEl) nameEl.textContent = r.label;
    const roleEl = document.getElementById('userRoleLbl');
    if (roleEl) roleEl.textContent = r.readonly ? '只读' : '管理员';

    // Toggle UI elements safely
    const toggleEl = (id, show, displayVal) => {
      const el = document.getElementById(id);
      if (el) el.style.display = show ? (displayVal||'flex') : 'none';
    };
    toggleEl('readonlyBadge', isReadonly, 'inline-flex');
    toggleEl('storagePill', isAdmin, 'flex');
    toggleEl('adminTools', isAdmin, 'flex');
    toggleEl('scheduleAdminBtns', isAdmin, 'flex');
    toggleEl('rcAdminBtns', isAdmin, 'flex');
    toggleEl('rcImportArea', isAdmin, 'block');
    toggleEl('rcSaveArea', isAdmin, 'flex');
    toggleEl('addProjBtn', isAdmin, 'inline-flex');
    toggleEl('notesAdminBtns', isAdmin, 'flex');
    toggleEl('uploadMediaBtn', isAdmin, 'inline-flex');
    toggleEl('uploadFilesBtn', isAdmin, 'inline-flex');
    toggleEl('memoInputBar', isAdmin, 'flex');

    // Class filter for students
    if (isReadonly && r.classFilter) {
      calClassFilter = r.classFilter;
      rollSelectedGroup = r.label;
    }

    initApp();
  } catch(e) {
    console.error('Login error:', e);
    showLoginErr('登录出错: ' + e.message);
  }
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function doLogout() {
  currentRole = null;
  isReadonly = false;
  rollSelectedGroup = null;
  calClassFilter = 'all';
  document.getElementById('loginPwd').value = '';
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('loginErr').classList.remove('show');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ============================================================
//  SIDEBAR & NAVIGATION
// ============================================================
let sidebarCollapsed = false;

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
  localStorage.setItem('wb_sidebar_collapsed', sidebarCollapsed ? '1' : '0');
}

const TAB_TITLES = {
  dashboard: '数据看板', schedule: '日历日程', rollcall: '点名签到',
  projects: '项目管理', notes: '知识笔记', memos: '备忘待办',
  files: '文件中心', media: '媒体库'
};

function switchTab(btn) {
  const tab = btn.dataset.tab;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  const el = document.getElementById(tab);
  if (el) el.classList.add('active');
  document.getElementById('topbarTitle').textContent = TAB_TITLES[tab] || tab;
  // Render on demand
  if (tab === 'schedule') renderCalendar();
  if (tab === 'rollcall') renderRollCall();
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'projects') renderProjects();
  if (tab === 'notes') renderNotes();
  if (tab === 'memos') renderMemos();
  if (tab === 'files') { renderFiles(); updateFcCounts(); }
  if (tab === 'media') renderMedia();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.contentEditable === 'true') return;
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveCurrentNote();
    showToast('已保存', 'success');
  }
  if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
    const memoInput = document.getElementById('memoInput');
    if (memoInput && document.getElementById('memos').classList.contains('active')) {
      e.preventDefault();
      memoInput.focus();
    }
  }
  // Ctrl+1~8 switch tabs
  if ((e.ctrlKey || e.metaKey) && e.key >= '1' && e.key <= '8') {
    const tabs = ['dashboard','schedule','rollcall','projects','notes','memos','files','media'];
    const idx = parseInt(e.key) - 1;
    if (tabs[idx]) {
      e.preventDefault();
      const btn = document.querySelector(`.nav-item[data-tab="${tabs[idx]}"]`);
      if (btn) switchTab(btn);
    }
  }
});

// ============================================================

// ============================================================
const DB = {
  dirHandle: null,
  config: {
    version: '3.0', lastOpen: null, lastDirName: null,
    eventColors: [
      { key: 'all',     label: '全校',  color: '#4f6ef7', classScope: 'all' },
      { key: 'grade7',  label: '七年级', color: '#22c55e', classScope: 'grade7' },
      { key: 'grade8',  label: '八年级', color: '#3b82f6', classScope: 'grade8' },
      { key: 'grade9',  label: '九年级', color: '#ef4444', classScope: 'grade9' },
      { key: 'evening', label: '晚托班', color: '#a855f7', classScope: 'evening' },
      { key: 'other',   label: '其他',  color: '#8e8e93', classScope: 'all' }
    ]
  },
  data: {},
  get eventColors() { return this.config.eventColors; }
};

const SCHEMA = {
  projects: [], schedules: [],
  notesCats: [{ id:'nc_def', name:'默认分类', folders:[{ id:'nf_def', name:'默认文件夹', notes:[] }] }],
  memos: [], fileFolders: [], filesIndex: [], media: [],
  people: [], rollcall: []
};

// selectStorageDir FSA - replaced by cloud version
async function _fsaSelectStorageDir() {
  try {
    const handle = await window.showDirectoryPicker();
    DB.dirHandle = handle;
    DB.config.lastDirName = handle.name;
    try {
      const db = await openHandleDB();
      const tx = db.transaction('handles','readwrite');
      tx.objectStore('handles').put(handle, 'lastDir');
    } catch(e) {}
    await initStorage();
    showToast('已连接: ' + handle.name, 'success');
    updateStorageBar();
  } catch(e) {
    if (e.name !== 'AbortError') showToast('连接失败: ' + e.message, 'error');
  }
}

function openHandleDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('WB_V3_HandleDB', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function initStorage() {
  if (!DB.dirHandle) return;
  for (const d of ['data','media','files','backup']) {
    try { await DB.dirHandle.getDirectoryHandle(d, { create: true }); } catch(e) {}
  }
  try {
    const fh = await DB.dirHandle.getFileHandle('config.json');
    DB.config = { ...DB.config, ...JSON.parse(await (await fh.getFile()).text()) };
  } catch { await writeJsonFile('config.json', DB.config); }
  if (!DB.config.eventColors?.length) {
    DB.config.eventColors = SCHEMA_DEFAULTS_eventColors();
  }
  for (const key of Object.keys(SCHEMA)) {
    const path = 'data/' + key + '.json';
    try {
      const parts = path.split('/');
      let dir = DB.dirHandle;
      for (let i = 0; i < parts.length - 1; i++) dir = await dir.getDirectoryHandle(parts[i]);
      const fh = await dir.getFileHandle(parts[parts.length - 1]);
      const text = await (await fh.getFile()).text();
      DB.data[key] = text.trim() ? JSON.parse(text) : JSON.parse(JSON.stringify(SCHEMA[key]));
    } catch {
      DB.data[key] = JSON.parse(JSON.stringify(SCHEMA[key]));
      await writeJsonFile(path, DB.data[key]);
    }
  }
  DB.config.lastOpen = new Date().toISOString();
  await writeJsonFile('config.json', DB.config);
  localStorage.setItem('wb_v3_lastDir', DB.config.lastDirName);
  renderAll();
}

function SCHEMA_DEFAULTS_eventColors() {
  return [
    { key:'all',     label:'全校',  color:'#4f6ef7', classScope:'all' },
    { key:'grade7',  label:'七年级', color:'#22c55e', classScope:'grade7' },
    { key:'grade8',  label:'八年级', color:'#3b82f6', classScope:'grade8' },
    { key:'grade9',  label:'九年级', color:'#ef4444', classScope:'grade9' },
    { key:'evening', label:'晚托班', color:'#a855f7', classScope:'evening' },
    { key:'other',   label:'其他',  color:'#8e8e93', classScope:'all' }
  ];
}

async function writeJsonFile(path, data) {
  if (!DB.dirHandle) return;
  const parts = path.split('/');
  let dir = DB.dirHandle;
  for (let i = 0; i < parts.length - 1; i++) dir = await dir.getDirectoryHandle(parts[i], { create: true });
  const fh = await dir.getFileHandle(parts[parts.length - 1], { create: true });
  const ws = await fh.createWritable();
  await ws.write(JSON.stringify(data ?? {}, null, 2));
  await ws.close();
}

async function _fsaAutoBackup() {

async function tryAutoReconnect() {
  try {
    const db = await openHandleDB();
    const tx = db.transaction('handles','readonly');
    const handle = await new Promise((res, rej) => {
      const req = tx.objectStore('handles').get('lastDir');
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
    if (!handle) return;
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      DB.dirHandle = handle; DB.config.lastDirName = handle.name;
      await initStorage(); updateStorageBar();
      showToast('已自动恢复连接: ' + handle.name, 'success');
    } else if (perm === 'prompt') {
      showReconnectBanner(handle);
    }
  } catch(e) {}
}

function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtSize(b) {
  if (!b) return '--';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}
function fmtD(s) { return s ? s.slice(0,10) : '--'; }

function showToast(msg, type = '') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  const icons = { success:'✓', error:'✕', warning:'⚠' };
  t.innerHTML = (icons[type] ? `<span>${icons[type]}</span>` : '') + escapeHtml(msg);
  tc.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(16px)'; t.style.transition = '0.3s'; setTimeout(() => t.remove(), 300); }, 2800);
}

let calCurrentMonth = new Date();
let calSelectedDate = today();
let calActiveFilters = new Set(DB.config.eventColors.map(c => c.key));
let calClassFilter = 'all'; // 'all', 'grade7', 'grade8', 'grade9', 'evening'

function i18nDay(d) { return ['周日','周一','周二','周三','周四','周五','周六'][d]; }

function setCalClass(cls, btn) {
  calClassFilter = cls;
  document.querySelectorAll('.class-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar();
}

function getFilteredSchedules(dateStr) {
  return (DB.data.schedules || []).filter(s => {
    if (dateStr && s.date !== dateStr) return false;
    if (!calActiveFilters.has(s.type)) return false;
    // Class filter
    if (calClassFilter !== 'all') {
      const ec = DB.eventColors.find(c => c.key === s.type);
      if (ec && ec.classScope !== 'all' && ec.classScope !== calClassFilter) return false;
    }
    // Student: only see their class + all-school events
    if (isReadonly && currentRole) {
      const ec = DB.eventColors.find(c => c.key === s.type);
      if (ec && ec.classScope !== 'all' && ec.classScope !== ROLES[currentRole].classFilter) return false;
    }
    return true;
  });
}

function renderCalendar() {
  const container = document.getElementById('calMonths');
  const months = [new Date(calCurrentMonth)];
  const d2 = new Date(calCurrentMonth); d2.setMonth(d2.getMonth() + 1);
  months.push(d2);
  container.innerHTML = months.map((m, idx) => renderMonthCalendar(m, idx)).join('');
  renderCalendarFilters();
  renderDailySchedule();
  // Hide class filter bar for students (auto-filtered)
  document.getElementById('calClassFilter').style.display = isReadonly ? 'none' : 'flex';
}

function renderMonthCalendar(date, index) {
  const y = date.getFullYear(), m = date.getMonth();
  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  const startOffset = (firstDay.getDay() + 6) % 7;
  const daysInMonth = lastDay.getDate();
  const prevMonthDays = new Date(y, m, 0).getDate();

  let html = '<div class="cal-month-wrap">';
  html += '<div class="cal-month-header"><div class="cal-month-title">' + y + '年' + (m+1) + '月</div><div class="cal-nav">';
  if (index === 0) {
    html += '<button class="cal-nav-btn" onclick="changeCalMonth(-1)">◀</button>';
    html += '<button class="cal-today-btn" onclick="setCalMonthToday()">今天</button>';
    html += '<button class="cal-nav-btn" onclick="changeCalMonth(1)">▶</button>';
  }
  html += '</div></div><div class="cal-grid">';
  ['一','二','三','四','五','六','日'].forEach(d => { html += '<div class="cal-weekday">' + d + '</div>'; });

  for (let i = startOffset - 1; i >= 0; i--) {
    html += '<div class="cal-day other-month"><span class="cal-day-num">' + (prevMonthDays - i) + '</span></div>';
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const ds = y + '-' + String(m+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    const isToday = ds === today();
    const isSelected = ds === calSelectedDate;
    const daySchedules = getFilteredSchedules(ds);
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    html += '<div class="' + cls + '" onclick="selectCalDate(\'' + ds + '\')">';
    html += '<span class="cal-day-num">' + day + '</span>';
    if (daySchedules.length) {
      html += '<div class="cal-day-dots">';
      daySchedules.slice(0,5).forEach(s => {
        const c = DB.eventColors.find(ec => ec.key === s.type);
        html += '<div class="cal-dot" style="background:' + (c ? c.color : '#8e8e93') + '"></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }
  const totalCells = startOffset + daysInMonth;
  const nextPadding = (7 - (totalCells % 7)) % 7;
  for (let day = 1; day <= nextPadding; day++) {
    html += '<div class="cal-day other-month"><span class="cal-day-num">' + day + '</span></div>';
  }
  html += '</div></div>';
  return html;
}

function renderCalendarFilters() {
  const el = document.getElementById('calFilters');
  el.innerHTML = DB.eventColors.map(c => {
    const active = calActiveFilters.has(c.key);
    return '<div class="cal-filter-item ' + (active?'active':'') + '" onclick="toggleCalFilter(\'' + c.key + '\')">' +
      '<div class="cal-dot" style="background:' + c.color + ';width:7px;height:7px;"></div>' +
      '<span>' + c.label + '</span></div>';
  }).join('');
}

function toggleCalFilter(key) {
  if (calActiveFilters.has(key)) calActiveFilters.delete(key); else calActiveFilters.add(key);
  renderCalendar();
}
function changeCalMonth(delta) { calCurrentMonth.setMonth(calCurrentMonth.getMonth() + delta); renderCalendar(); }
function setCalMonthToday() { calCurrentMonth = new Date(); calSelectedDate = today(); renderCalendar(); }
function selectCalDate(ds) { calSelectedDate = ds; renderCalendar(); }

function renderDailySchedule() {
  const headerEl = document.getElementById('dailyDate');
  const d = new Date(calSelectedDate + 'T00:00:00');
  headerEl.textContent = calSelectedDate + ' ' + i18nDay(d.getDay());
  const list = document.getElementById('dailyScheduleList');
  const schedules = getFilteredSchedules(calSelectedDate).sort((a,b) => (a.start||'').localeCompare(b.start||''));

  const START_HOUR = 8, END_HOUR = 20, SLOT_HEIGHT = 48;
  const totalHeight = (END_HOUR - START_HOUR + 1) * SLOT_HEIGHT;

  let html = '<div class="time-axis-wrap" style="height:' + totalHeight + 'px;position:relative;">';

  if (calSelectedDate === today()) {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const startMin = START_HOUR * 60;
    if (nowMin >= startMin && nowMin <= END_HOUR * 60) {
      html += '<div class="time-axis-now-line" style="top:' + (((nowMin-startMin)/60)*SLOT_HEIGHT) + 'px;"></div>';
    }
  }

  for (let h = START_HOUR; h <= END_HOUR; h++) {
    const timeStr = String(h).padStart(2,'0') + ':00';
    html += '<div class="time-axis-row"><div class="time-axis-label">' + timeStr + '</div>';
    if (!isReadonly) {
      html += '<div class="time-axis-slot" onclick="openScheduleModalForTime(\'' + calSelectedDate + '\',\'' + timeStr + '\')"></div>';
    } else {
      html += '<div class="time-axis-slot"></div>';
    }
    html += '</div>';
  }

  const axisStartMin = START_HOUR * 60;
  schedules.forEach((s, idx) => {
    const c = DB.eventColors.find(ec => ec.key === s.type) || DB.eventColors[DB.eventColors.length-1];
    let top = 0, height = SLOT_HEIGHT;
    if (s.start) { const [sh,sm] = s.start.split(':').map(Number); top = ((sh*60+(sm||0) - axisStartMin)/60)*SLOT_HEIGHT; }
    if (s.end) { const [eh,em] = s.end.split(':').map(Number); height = ((eh*60+(em||0) - axisStartMin)/60)*SLOT_HEIGHT - top; }
    if (top < 0) { height += top; top = 0; }
    if (top + height > totalHeight) height = totalHeight - top;
    if (height < 20) height = 20;
    const leftOffset = (idx % 3) * 22;
    html += '<div class="time-axis-event" style="top:' + top + 'px;height:' + height + 'px;left:' + (56+leftOffset) + 'px;right:8px;border-left-color:' + c.color + ';background:' + c.color + '18;" onclick="' + (isReadonly ? '' : 'editSchedule(\''+s.id+'\')') + '">' +
      '<div class="time-axis-event-title" style="color:' + c.color + ';">' + escapeHtml(s.title) + '</div>' +
      (height > 30 ? '<div class="time-axis-event-time">' + (s.start||'') + (s.end?' - '+s.end:'') + ' · ' + c.label + '</div>' : '') +
      '</div>';
  });

  html += '</div>';
  if (!schedules.length) html += '<div class="empty-state" style="margin-top:20px;"><div>暂无日程安排</div></div>';
  list.innerHTML = html;
}

function timeOptions(selected) {
  let html = '<option value="">全天</option>';
  for (let h = 7; h <= 22; h++) {

      html += '<option value="' + t + '"' + (t===selected?' selected':'') + '>' + t + '</option>';

  return html;
}

let batchSelectedDates = new Set();
let batchViewYear, batchViewMonth;
let delBatchSelectedDates = new Set();
let delBatchViewYear, delBatchViewMonth;

function openBatchCreateModal() {

function openBatchDeleteModal() {
  if (isReadonly) return;
  delBatchSelectedDates = new Set();
  const now = new Date(); delBatchViewYear = now.getFullYear(); delBatchViewMonth = now.getMonth();
  const body = '<div class="form-group"><label class="form-label">选择要删除的日期</label>' +
    '<div id="delBatchDateWrap">' + renderBatchDatePicker(delBatchViewYear, delBatchViewMonth, delBatchSelectedDates, 'del') + '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary);margin-top:6px;">已选 <span id="delBatchDateCount">0</span> 天</div></div>';
  openModal('批量删除日程', body, '<button class="btn" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="executeBatchDelete()">批量删除</button>');
}
function renderBatchDatePicker(y, m, selectedSet, prefix) {
  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  const startOffset = (firstDay.getDay() + 6) % 7;
  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
    '<button class="btn btn-sm" onclick="changeBatchMonth(\'' + prefix + '\',-1)">◀</button>' +
    '<span style="font-weight:600;">' + y + '年' + (m+1) + '月</span>' +
    '<button class="btn btn-sm" onclick="changeBatchMonth(\'' + prefix + '\',1)">▶</button></div>';
  html += '<div class="batch-date-grid">';
  ['一','二','三','四','五','六','日'].forEach(d => { html += '<div style="text-align:center;font-size:10px;color:var(--text-tertiary);padding:3px 0;">' + d + '</div>'; });
  for (let i = startOffset-1; i >= 0; i--) html += '<div class="batch-date-cell other-month">' + (new Date(y,m,0).getDate()-i) + '</div>';
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const ds = y + '-' + String(m+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    const sel = selectedSet.has(ds);
    html += '<div class="batch-date-cell' + (sel?' selected':'') + (ds===today()?' today':'') + '" onclick="toggleBatchDate(\'' + prefix + '\',\'' + ds + '\')">' + day + '</div>';
  }
  html += '</div>';
  return html;
}
function changeBatchMonth(prefix, delta) {
  if (prefix === 'del') {
    delBatchViewMonth += delta;
    if (delBatchViewMonth > 11) { delBatchViewMonth=0; delBatchViewYear++; }
    if (delBatchViewMonth < 0) { delBatchViewMonth=11; delBatchViewYear--; }
    document.getElementById('delBatchDateWrap').innerHTML = renderBatchDatePicker(delBatchViewYear, delBatchViewMonth, delBatchSelectedDates, 'del');
  } else {
    batchViewMonth += delta;
    if (batchViewMonth > 11) { batchViewMonth=0; batchViewYear++; }
    if (batchViewMonth < 0) { batchViewMonth=11; batchViewYear--; }
    document.getElementById('batchDateWrap').innerHTML = renderBatchDatePicker(batchViewYear, batchViewMonth, batchSelectedDates, 'batch');
  }
}
function toggleBatchDate(prefix, ds) {
  const set = prefix === 'del' ? delBatchSelectedDates : batchSelectedDates;
  if (set.has(ds)) set.delete(ds); else set.add(ds);
  const wrap = prefix === 'del' ? 'delBatchDateWrap' : 'batchDateWrap';
  const countEl = prefix === 'del' ? 'delBatchDateCount' : null;
  document.getElementById(wrap).innerHTML = renderBatchDatePicker(
    prefix==='del'?delBatchViewYear:batchViewYear,
    prefix==='del'?delBatchViewMonth:batchViewMonth,
    set, prefix);
  if (countEl) document.getElementById(countEl).textContent = set.size;
}
function executeBatchCreate() {
  if (isReadonly) return;
  const title = (document.getElementById('batchTitle')?.value||'').trim();
  if (!title) { showToast('请输入标题', 'warning'); return; }
  if (!batchSelectedDates.size) { showToast('请选择日期', 'warning'); return; }
  const schedules = DB.data.schedules || [];
  batchSelectedDates.forEach(date => {
    schedules.push({ id:'sch_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), title, date,
      start:document.getElementById('batchStart').value, end:document.getElementById('batchEnd').value,
      type:document.getElementById('batchType').value, desc:'' });
  });
  DB.data.schedules = schedules;
  saveData('schedules'); autoBackup(); closeModal(); renderCalendar(); renderDashboard();
  showToast('已批量创建 ' + batchSelectedDates.size + ' 条日程', 'success');
}
function executeBatchDelete() {
  if (isReadonly || !delBatchSelectedDates.size) return;
  if (!confirm('确定删除选中日期的所有日程？')) return;
  DB.data.schedules = (DB.data.schedules||[]).filter(s => !delBatchSelectedDates.has(s.date));
  saveData('schedules'); autoBackup(); closeModal(); renderCalendar(); renderDashboard();
  showToast('已批量删除', 'success');
}

let rollDate = today();
let rollSelectedGroup = null;

function setRollDateToday() { rollDate = today(); renderRollCall(); }

function renderRollCall() { renderPeopleList(); renderRollGroups(); renderRollCheckTable(); }

function renderPeopleList() {
  const search = (document.getElementById('rcSearch')?.value||'').toLowerCase();

function renderRollGroups() {
  const people = DB.data.people || [];

  people.forEach(p => { const g = p.group||'未分组'; groups[g] = (groups[g]||0)+1; });

function selectRollGroup(g) { rollSelectedGroup = rollSelectedGroup===g ? null : g; renderRollCall(); }

function renderRollCheckTable() {
  document.getElementById('rcCheckDate').textContent = rollDate;
  const records = (DB.data.rollcall||{})[rollDate] || {};
  let people = (DB.data.people||[]).filter(p => !rollSelectedGroup || p.group===rollSelectedGroup);
  // Students only see their class
  if (isReadonly && currentRole && ROLES[currentRole].label) {
    people = people.filter(p => p.group === ROLES[currentRole].label);
  }
  const el = document.getElementById('rcCheckTables');
  if (!people.length) { el.innerHTML = '<div class="empty-state">暂无人员数据</div>'; return; }
  const groups = {};
  people.forEach(p => { const g = p.group||'未分组'; if (!groups[g]) groups[g]=[]; groups[g].push(p); });
  el.innerHTML = Object.entries(groups).map(([groupName, members]) => {
    const present = members.filter(p=>records[p.id]?.status==='present').length;
    const absent = members.filter(p=>records[p.id]?.status==='absent').length;
    const late = members.filter(p=>records[p.id]?.status==='late').length;
    return '<div style="padding:0 0 20px;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg-hover);border-bottom:1px solid var(--border-light);">' +
      '<span style="font-size:13px;font-weight:600;">' + escapeHtml(groupName) + ' (' + members.length + '人)</span>' +
      '<span style="font-size:12px;color:var(--text-secondary);">到 '+present+' · 缺 '+absent+' · 迟 '+late+'</span></div>' +
      '<table class="rc-check-table"><thead><tr>' +
      '<th>姓名</th>' + (isReadonly ? '' : '<th>签到</th><th>缺席</th><th>迟到</th>') + '<th>状态</th><th>备注</th>' +
      '</tr></thead><tbody>' +
      members.map(p => {
        const r = records[p.id] || {};
        const statusText = {present:'✅ 已到', absent:'❌ 缺席', late:'⚠️ 迟到'}[r.status] || '—';
        return '<tr>' +
          '<td style="font-weight:500;">' + escapeHtml(p.name) + '</td>' +
          (isReadonly ? '' :
            '<td><button class="rc-status-btn '+(r.status==='present'?'present':'')+'" onclick="setRollStatus(\''+p.id+'\',\'present\')">签到</button></td>' +
            '<td><button class="rc-status-btn '+(r.status==='absent'?'absent':'')+'" onclick="setRollStatus(\''+p.id+'\',\'absent\')">缺席</button></td>' +
            '<td><button class="rc-status-btn '+(r.status==='late'?'late':'')+'" onclick="setRollStatus(\''+p.id+'\',\'late\')">迟到</button></td>'
          ) +
          '<td>' + statusText + '</td>' +
          '<td><div class="rc-note-cell '+(r.note?'has-note':'')+'" ' +
            (isReadonly ? '' : 'onclick="editRollNote(\''+p.id+'\')">') +
            (r.note ? escapeHtml(r.note) : (isReadonly ? '—' : '添加备注')) + '</div></td>' +
          '</tr>';
      }).join('') + '</tbody></table></div>';
  }).join('');
}

async function setRollStatus(personId, status) {
  if (isReadonly) return;
  if (!DB.data.rollcall) DB.data.rollcall = {};
  if (!DB.data.rollcall[rollDate]) DB.data.rollcall[rollDate] = {};
  const current = DB.data.rollcall[rollDate][personId];
  if (current && current.status === status) delete DB.data.rollcall[rollDate][personId];
  else DB.data.rollcall[rollDate][personId] = { status, note: current?.note||'' };
  await saveData('rollcall'); renderRollCheckTable(); renderDashboardRollCall();
}

function importPeopleCSV() {
  if (isReadonly) return;
  const input = document.createElement('input'); input.type='file'; input.accept='.csv,.txt';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    const text = await file.text();
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    const imported = lines.map(line => { const parts=line.split(',').map(s=>s.trim()); return parts[0] ? {id:'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),name:parts[0],group:parts[1]||'',note:parts[2]||''} : null; }).filter(Boolean);

  };

    html += '<tr><td style="padding:7px;border-bottom:1px solid var(--border-light);">'+d+'</td>' +
      '<td style="text-align:center;padding:7px;border-bottom:1px solid var(--border-light);color:var(--green);">'+present+'</td>' +
      '<td style="text-align:center;padding:7px;border-bottom:1px solid var(--border-light);color:var(--red);">'+absent+'</td>' +
      '<td style="text-align:center;padding:7px;border-bottom:1px solid var(--border-light);color:var(--orange);">'+late+'</td></tr>';
  });
  html += '</tbody></table></div>';
  openModal('签到统计（近30天）', html, '<button class="btn" onclick="closeModal()">关闭</button>');
}

//  PROJECTS (same logic, readonly guard added)
// ============================================================
let selectedProjectId = null;
let expandedTasks = new Set();

function renderProjects() {
  const grid = document.getElementById('projGrid');
  const projects = DB.data.projects || [];
  if (!projects.length) {
    grid.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><div>暂无项目</div></div>';
    return;
  }
  grid.innerHTML = projects.map(proj => {
    const pct = projProg(proj);
    const pctColor = pct===100?'var(--green)':pct>=50?'var(--accent)':pct>=25?'var(--orange)':'var(--red)';
    return '<div class="proj-card" onclick="openProjDetail(\'' + proj.id + '\')">' +
      '<div class="proj-card-accent" style="background:' + (proj.color||'var(--accent)') + '"></div>' +
      '<div class="proj-name"><div class="color-bar" style="background:' + (proj.color||'var(--accent)') + ';"></div>' + escapeHtml(proj.name) + '</div>' +
      '<div class="proj-date">' + fmtD(proj.start) + ' → ' + fmtD(proj.end) + '</div>' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + pctColor + ';"></div></div>' +
      '<div class="progress-meta"><span>' + (proj.tasks||[]).filter(t=>taskDone(t)).length + ' / ' + (proj.tasks||[]).length + ' 任务</span><span class="ppct" style="color:' + pctColor + ';">' + pct + '%</span></div>' +
      (isReadonly ? '' : '<div class="card-actions"><button class="btn btn-sm" onclick="event.stopPropagation();openProjectModal(\''+proj.id+'\')">编辑</button><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteProject(\''+proj.id+'\')">删除</button></div>') +
      '</div>';
  }).join('');
}

function projProg(proj) {
  const tasks = proj.tasks||[];
  if (!tasks.length) return 0;
  const done = tasks.filter(t=>taskDone(t)).length;
  return Math.round(done/tasks.length*100);
}
function taskDone(t) { return t.subtasks?.length ? t.subtasks.every(s=>s.done) : !!t.done; }
function taskProg(t) { const s=t.subtasks||[]; return s.length ? Math.round(s.filter(x=>x.done).length/s.length*100) : (t.done?100:0); }
function getProject(id) { return (DB.data.projects||[]).find(p=>p.id===id)||null; }

function openProjDetail(id) {
  selectedProjectId = id;
  document.getElementById('projListView').classList.add('hidden');
  const projDetail = document.getElementById('projDetail');
  projDetail.classList.add('active');
  renderProjDetail();
}

function renderProjDetail() {
  const p = getProject(selectedProjectId); if (!p) return;
  const pct = projProg(p);
  const pctColor = pct===100?'#22c55e':pct>=50?'#4f6ef7':pct>=25?'#f97316':'#ef4444';
  const r = 38, circ = 2*Math.PI*r;
  const detail = document.getElementById('projDetail');
  detail.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button class="btn btn-sm" onclick="backToProjList()">← 返回</button>
      <h2 style="font-size:18px;font-weight:700;">${escapeHtml(p.name)}</h2>
      ${isReadonly ? '' : '<button class="btn btn-sm" onclick="openProjectModal(\''+p.id+'\')">编辑项目</button>'}
    </div>
    <div class="detail-hero">
      <div class="detail-ring">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle class="ring-bg" cx="48" cy="48" r="${r}"/>
          <circle class="ring-fill" cx="48" cy="48" r="${r}" stroke="${pctColor}"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}"/>
        </svg>
        <div class="ring-center"><div class="ring-pct">${pct}%</div><div class="ring-lbl">完成</div></div>
      </div>
      <div>
        <h2 style="font-size:18px;font-weight:700;">${escapeHtml(p.name)}</h2>
        <div style="font-size:12px;color:var(--text-secondary);margin:4px 0 12px;">${fmtD(p.start)} → ${fmtD(p.end)}</div>
        <div style="display:flex;gap:16px;">
          <div style="text-align:center;"><div style="font-size:20px;font-weight:700;">${(p.tasks||[]).length}</div><div style="font-size:11px;color:var(--text-secondary);">总任务</div></div>
          <div style="text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--green);">${(p.tasks||[]).filter(t=>taskDone(t)).length}</div><div style="font-size:11px;color:var(--text-secondary);">已完成</div></div>
          <div style="text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--orange);">${(p.tasks||[]).filter(t=>!taskDone(t)).length}</div><div style="font-size:11px;color:var(--text-secondary);">进行中</div></div>
        </div>
      </div>
    </div>
    <div class="task-wrapper">
      <div class="task-header"><h3>任务清单</h3>${isReadonly?'':'<button class="btn btn-primary btn-sm" onclick="openTaskModal()">+ 添加任务</button>'}</div>
      <div id="taskList"></div>
    </div>`;
  renderTaskList(p);
}

function backToProjList() {
  selectedProjectId = null;
  document.getElementById('projListView').classList.remove('hidden');
  document.getElementById('projDetail').classList.remove('active');
}

function renderTaskList(p) {
  const list = document.getElementById('taskList'); if (!list) return;
  const tasks = p.tasks||[];
  if (!tasks.length) { list.innerHTML = '<div class="empty-state" style="padding:28px;">还没有任务</div>'; return; }
  const pend = tasks.filter(t=>!taskDone(t)), dn = tasks.filter(t=>taskDone(t));
  let h = '';
  if (pend.length) { h += '<div class="task-section-bar"><span>未完成</span><span class="sec-badge">'+pend.length+'</span></div>'; pend.forEach(t=>h+=buildTR(t)); }
  if (dn.length) { h += '<div class="task-section-bar"><span>已完成</span><span class="sec-badge">'+dn.length+'</span></div>'; dn.forEach(t=>h+=buildTR(t)); }
  list.innerHTML = h;
}
function buildTR(t) {
  const subs=t.subtasks||[], hasSubs=subs.length>0, dn=taskDone(t), pg=taskProg(t), op=expandedTasks.has(t.id);
  const statusCls = dn?'tag-done':'tag-active', statusTxt = dn?'已完成':(hasSubs&&pg>0?pg+'%':'待完成');
  let h = '<div class="task-row">' +
    '<div class="expand-btn '+(op?'open ':'')+(hasSubs?'':'no-subs ')+'" onclick="event.stopPropagation();toggleExpand(\''+t.id+'\')">▶</div>' +
    '<div class="task-check '+(dn?'done':'')+'" onclick="'+(isReadonly?'':'toggleTask(\''+t.id+'\')')+'"></div>' +
    '<div class="task-detail"><div class="tname '+(dn?'struck':'')+'">'+escapeHtml(t.name)+'</div>' +
    (t.note?'<div class="tnote">'+escapeHtml(t.note)+'</div>':'') +
    (hasSubs?'<div class="sub-progress"><div class="sub-pbar"><div class="fill" style="width:'+pg+'%"></div></div><span class="sp-text">'+subs.filter(s=>s.done).length+'/'+subs.length+'</span></div>':'') +
    '</div><span class="status-tag '+statusCls+'">'+statusTxt+'</span>' +
    (isReadonly ? '' : '<div class="task-row-actions"><button class="btn btn-sm btn-ghost" onclick="openSubModal(\''+t.id+'\',null)">+子任务</button><button class="btn btn-sm" onclick="openTaskModal(\''+t.id+'\')">编辑</button><button class="btn btn-sm btn-danger" onclick="deleteTask(\''+t.id+'\')">删除</button></div>') +
    '</div>';
  if (hasSubs) {
    h += '<div class="subtask-area '+(op?'open':'')+'"><div class="subtask-inner"><div class="subtask-head"><span>子任务 ('+subs.filter(s=>s.done).length+'/'+subs.length+')</span>' +
      (isReadonly?'':'<button class="btn btn-ghost" onclick="openSubModal(\''+t.id+'\',null)">+ 添加</button>') + '</div>';
    subs.filter(s=>!s.done).concat(subs.filter(s=>s.done)).forEach(s=>h+=buildSR(t.id,s));
    h += '</div></div>';
  }
  return h;
}
function buildSR(tid, s) {
  return '<div class="subtask-row"><div class="sub-check '+(s.done?'done':'')+'" onclick="'+(isReadonly?'':'toggleSubTask(\''+tid+'\',\''+s.id+'\')') +'"></div>' +
    '<span class="sub-name '+(s.done?'struck':'')+'">'+escapeHtml(s.name)+'</span>' +
    (isReadonly?'':'<div class="sub-actions"><button class="btn btn-sm btn-ghost" onclick="openSubModal(\''+tid+'\',\''+s.id+'\')">编辑</button><button class="btn btn-sm btn-danger" onclick="deleteSubTask(\''+tid+'\',\''+s.id+'\')">删</button></div>') +
    '</div>';
}
function toggleExpand(tid) { if(expandedTasks.has(tid))expandedTasks.delete(tid);else expandedTasks.add(tid); const p=getProject(selectedProjectId);if(p)renderTaskList(p); }
function toggleTask(id) {
  if(isReadonly)return;
  const p=getProject(selectedProjectId);if(!p)return;
  const t=(p.tasks||[]).find(x=>x.id===id);if(!t)return;
  const s=t.subtasks||[];
  if(s.length){const all=s.every(x=>x.done);s.forEach(x=>x.done=!all);}else t.done=!t.done;
  saveData('projects');autoBackup();renderProjDetail();renderProjects();
}
function openTaskModal(editId) {
  if(isReadonly)return;
  const p=getProject(selectedProjectId);if(!p)return;
  const t=editId?(p.tasks||[]).find(x=>x.id===editId):null;
  openModal(t?'编辑任务':'添加任务',
    '<div class="form-group"><label class="form-label">任务名称</label><input class="form-input" id="taskName" value="'+(t?escapeHtml(t.name):'')+'"></div>' +
    '<div class="form-group"><label class="form-label">备注</label><textarea class="form-textarea" id="taskNote">'+(t?escapeHtml(t.note||''):'')+'</textarea></div>',
    '<div style="flex:1"></div><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveTaskModal(\''+(editId||'')+'\')">保存</button>');
}
function saveTaskModal(editId) {
  if(isReadonly)return;
  const nm=(document.getElementById('taskName')?.value||'').trim();
  const nt=(document.getElementById('taskNote')?.value||'').trim();
  const p=getProject(selectedProjectId);if(!p||!nm){showToast('请输入名称','warning');return;}
  if(!p.tasks)p.tasks=[];
  if(editId){const t=p.tasks.find(x=>x.id===editId);if(t){t.name=nm;t.note=nt;}}
  else p.tasks.push({id:'task_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),name:nm,note:nt,subtasks:[],done:false,createdAt:new Date().toISOString()});
  saveData('projects');autoBackup();closeModal();renderProjDetail();renderProjects();showToast('已保存','success');
}
function deleteTask(id) {
  if(isReadonly||!confirm('删除此任务？'))return;
  const p=getProject(selectedProjectId);if(!p)return;
  p.tasks=(p.tasks||[]).filter(x=>x.id!==id);
  saveData('projects');autoBackup();renderProjDetail();renderProjects();showToast('已删除','success');
}
function openSubModal(taskId,subId) {
  if(isReadonly)return;
  const p=getProject(selectedProjectId);if(!p)return;
  const t=(p.tasks||[]).find(x=>x.id===taskId);if(!t)return;
  const s=subId?(t.subtasks||[]).find(x=>x.id===subId):null;
  openModal(s?'编辑子任务':'添加子任务',
    '<div class="form-group"><label class="form-label">子任务名称</label><input class="form-input" id="subName" value="'+(s?escapeHtml(s.name):'')+'"></div>' +
    '<input type="hidden" id="subTaskId" value="'+taskId+'">',
    '<div style="flex:1"></div><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveSubTaskModal(\''+(subId||'')+'\')">保存</button>');
}
function saveSubTaskModal(subId) {
  if(isReadonly)return;
  const nm=(document.getElementById('subName')?.value||'').trim();
  const tid=document.getElementById('subTaskId')?.value;
  const p=getProject(selectedProjectId);if(!p||!nm){showToast('请输入名称','warning');return;}
  const t=(p.tasks||[]).find(x=>x.id===tid);if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  if(subId){const s=t.subtasks.find(x=>x.id===subId);if(s)s.name=nm;}
  else t.subtasks.push({id:'sub_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),name:nm,done:false});
  t.done=t.subtasks.every(x=>x.done);
  saveData('projects');autoBackup();closeModal();renderProjDetail();renderProjects();showToast('已保存','success');
}
function toggleSubTask(taskId,subId) {
  if(isReadonly)return;
  const p=getProject(selectedProjectId);if(!p)return;
  const t=(p.tasks||[]).find(x=>x.id===taskId);if(!t)return;
  const s=(t.subtasks||[]).find(x=>x.id===subId);if(!s)return;
  s.done=!s.done;t.done=t.subtasks.every(x=>x.done);
  saveData('projects');autoBackup();renderProjDetail();renderProjects();
}
function deleteSubTask(taskId,subId) {
  if(isReadonly||!confirm('删除子任务？'))return;
  const p=getProject(selectedProjectId);if(!p)return;
  const t=(p.tasks||[]).find(x=>x.id===taskId);if(!t)return;
  t.subtasks=(t.subtasks||[]).filter(x=>x.id!==subId);
  if(!t.subtasks.length)t.done=false;else t.done=t.subtasks.every(x=>x.done);
  saveData('projects');autoBackup();renderProjDetail();renderProjects();showToast('已删除','success');
}

function openProjectModal(id) {
  if(isReadonly)return;
  const isEdit=!!id;
  const p=isEdit?(DB.data.projects||[]).find(x=>x.id===id):null;
  const colorOpts=['#4f6ef7','#22c55e','#ef4444','#f97316','#a855f7','#14b8a6','#ec4899','#eab308'];
  const body='<div class="form-group"><label class="form-label">项目名称</label><input class="form-input" id="projName" value="'+(p?escapeHtml(p.name):'')+'"></div>' +
    '<div class="form-row"><div class="form-group"><label class="form-label">开始日期</label><input class="form-input" type="date" id="projStart" value="'+(p?p.start:'')+'"></div>' +
    '<div class="form-group"><label class="form-label">结束日期</label><input class="form-input" type="date" id="projEnd" value="'+(p?p.end:'')+'"></div></div>' +
    '<div class="form-group"><label class="form-label">颜色</label><div style="display:flex;gap:8px;flex-wrap:wrap;">' +
    colorOpts.map(c=>'<div style="width:28px;height:28px;border-radius:50%;background:'+c+';cursor:pointer;border:3px solid '+(p&&p.color===c?'#000':'transparent')+';" onclick="document.getElementById(\'projColorInput\').value=\''+c+'\';document.querySelectorAll(\'.color-swatch\').forEach(x=>x.style.borderColor=\'transparent\');this.style.borderColor=\'rgba(0,0,0,0.5)\'" class="color-swatch"></div>').join('') +
    '</div><input type="hidden" id="projColorInput" value="'+(p?p.color||'#4f6ef7':'#4f6ef7')+'"></div>' +
    '<div class="form-group"><label class="form-label">描述</label><textarea class="form-textarea" id="projDesc">'+(p?escapeHtml(p.desc||''):'')+'</textarea></div>';

function saveProject(id) {
  if(isReadonly)return;
  const name=(document.getElementById('projName')?.value||'').trim();
  if(!name){showToast('请输入项目名','warning');return;}
  const data={id:id||'proj_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),name,start:document.getElementById('projStart').value,end:document.getElementById('projEnd').value,color:document.getElementById('projColorInput').value,desc:document.getElementById('projDesc').value.trim(),tasks:id?(getProject(id)?.tasks||[]):[]};
  const projects=DB.data.projects||[];
  const idx=projects.findIndex(p=>p.id===id);
  if(idx>=0)projects[idx]=data;else projects.push(data);
  DB.data.projects=projects;saveData('projects');autoBackup();closeModal();renderProjects();showToast('已保存','success');
}
function deleteProject(id) {
  if(isReadonly||!confirm('确定删除此项目及所有任务？'))return;
  DB.data.projects=(DB.data.projects||[]).filter(p=>p.id!==id);
  saveData('projects');autoBackup();closeModal();backToProjList();renderProjects();showToast('已删除','success');
}

// ============================================================
//  NOTES
// ============================================================
let selectedNotePath = null;
let noteExpanded = new Set();
let noteAutoSaveTimer = null;
let noteSavedState = 'saved';

function getNotesCats() { return DB.data.notesCats||[]; }
function findNoteObj(catId,folderId,noteId) {
  const cat=(DB.data.notesCats||[]).find(c=>c.id===catId);
  const folder=cat?.folders?.find(f=>f.id===folderId);
  return folder?.notes?.find(n=>n.id===noteId)||null;
}

function renderNotesTree() {
  const search=(document.getElementById('noteSearch')?.value||'').toLowerCase();
  const el=document.getElementById('notesTree');
  const cats=getNotesCats();
  let h='';
  cats.forEach(cat => {
    const isCatExp=noteExpanded.has('cat_'+cat.id);
    const filtered=search?cat.folders.filter(f=>f.name.toLowerCase().includes(search)||(f.notes||[]).some(n=>n.name.toLowerCase().includes(search))):cat.folders;
    h+='<div class="nt-node"><div class="nt-row" onclick="toggleNoteNode(\'cat_'+cat.id+'\')">' +
      '<span class="nt-toggle'+(isCatExp?' open':'')+(cat.folders.length===0?' leaf':'')+'">▶</span>' +
      '<span class="nt-icon">📂</span><span class="nt-label">'+escapeHtml(cat.name)+'</span>' +
      (isReadonly?'':'<span class="nt-actions"><button style="background:none;border:none;cursor:pointer;font-size:11px;padding:1px 3px;color:var(--text-tertiary);" onclick="event.stopPropagation();deleteNoteCategory(\''+cat.id+'\')">×</button></span>') +
      '</div>';
    if(filtered.length) {
      h+='<div class="nt-children'+(isCatExp?' open':'')+'">'; 
      filtered.forEach(folder => {
        const isFolderExp=noteExpanded.has('folder_'+folder.id);
        const notes=search?(folder.notes||[]).filter(n=>n.name.toLowerCase().includes(search)):(folder.notes||[]);
        const isActive=selectedNotePath&&selectedNotePath.folderId===folder.id&&!selectedNotePath.noteId;
        h+='<div class="nt-node"><div class="nt-row'+(isActive?' active':'')+'" onclick="selectNoteFolder(\''+cat.id+'\',\''+folder.id+'\')">' +
          '<span class="nt-toggle'+(isFolderExp?' open':'')+(notes.length===0?' leaf':'')+'">▶</span>' +
          '<span class="nt-icon">📁</span><span class="nt-label">'+escapeHtml(folder.name)+'<span style="color:var(--text-tertiary);font-size:10px;margin-left:4px;">'+folder.notes.length+'</span></span>' +
          (isReadonly?'':'<span class="nt-actions"><button style="background:none;border:none;cursor:pointer;font-size:11px;padding:1px 3px;color:var(--text-tertiary);" onclick="event.stopPropagation();deleteNoteFolder(\''+cat.id+'\',\''+folder.id+'\')">×</button></span>') +
          '</div>';
        if(notes.length) {
          h+='<div class="nt-children'+(isFolderExp?' open':'')+'">'; 
          notes.forEach(n => {
            const isActive=selectedNotePath&&selectedNotePath.noteId===n.id;
            h+='<div class="nt-node"><div class="nt-row'+(isActive?' active':'')+'" onclick="selectNote(\''+cat.id+'\',\''+folder.id+'\',\''+n.id+'\')">' +
              '<span class="nt-toggle leaf">▶</span><span class="nt-icon">📝</span><span class="nt-label">'+escapeHtml(n.name)+'</span>' +
              (isReadonly?'':'<span class="nt-actions"><button style="background:none;border:none;cursor:pointer;font-size:11px;padding:1px 3px;color:var(--text-tertiary);" onclick="event.stopPropagation();deleteNoteItem(\''+cat.id+'\',\''+folder.id+'\',\''+n.id+'\')">×</button></span>') +
              '</div></div>';
          });
          h+='</div>';
        }
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  el.innerHTML=h||'<div class="empty-state" style="padding:20px;">暂无笔记</div>';
}

function toggleNoteNode(key) { if(noteExpanded.has(key))noteExpanded.delete(key);else noteExpanded.add(key);renderNotesTree(); }
function selectNoteFolder(catId,folderId) { saveCurrentNote();selectedNotePath={catId,folderId,noteId:null};renderNotesTree();document.getElementById('noteEditorPanel').innerHTML='<div class="note-placeholder"><span style="font-size:28px">📁</span><span>选择一篇笔记，或点击 ✏️ 新建</span></div>'; }
function selectNote(catId,folderId,noteId) { saveCurrentNote();selectedNotePath={catId,folderId,noteId};renderNotesTree();const note=findNoteObj(catId,folderId,noteId);if(note)openNoteEditor(note,catId,folderId); }

function openNoteEditor(note,catId,folderId) {
  const cat=getNotesCats().find(c=>c.id===catId);
  const folder=cat?.folders?.find(f=>f.id===folderId);
  const panel=document.getElementById('noteEditorPanel');
  panel.innerHTML=
    '<div class="nep-head"><div class="nep-breadcrumb">'+escapeHtml(cat?.name||'')+'  /  '+escapeHtml(folder?.name||'')+'</div>' +
    (isReadonly?'<span class="readonly-badge" style="font-size:10px;padding:2px 8px;">只读</span>':'') +
    '</div>' +

};

const FC_TYPE_CONFIG = {
  pdf:   { label:'PDF',  icon:'📄', color:'#ef4444', bg:'rgba(239,68,68,0.1)',   ext:['pdf'] },
  doc:   { label:'文档', icon:'📝', color:'#3b82f6', bg:'rgba(59,130,246,0.1)',  ext:['doc','docx','txt','md','rtf','ppt','pptx'] },
  xls:   { label:'表格', icon:'📊', color:'#22c55e', bg:'rgba(34,197,94,0.1)',   ext:['xls','xlsx','csv'] },
  img:   { label:'图片', icon:'🖼️', color:'#f97316', bg:'rgba(249,115,22,0.1)', ext:['jpg','jpeg','png','gif','bmp','webp','svg'] },
  video: { label:'视频', icon:'🎬', color:'#a855f7', bg:'rgba(168,85,247,0.1)', ext:['mp4','mov','avi','mkv','webm'] },
  audio: { label:'音频', icon:'🎵', color:'#14b8a6', bg:'rgba(20,184,166,0.1)', ext:['mp3','wav','ogg','flac','aac'] },
  other: { label:'其他', icon:'📎', color:'#8e8e93', bg:'var(--bg-hover)',       ext:[] },
};

function getFileTypeKey(name) {
  const ext = (name.split('.').pop()||'').toLowerCase();
  for (const [key, cfg] of Object.entries(FC_TYPE_CONFIG)) {
    if (cfg.ext.includes(ext)) return key;
  }
  return 'other';
}

function setFileClass(cls, btn) {
  fileClassFilter = cls;
  document.querySelectorAll('.fc-class-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cfg = FC_CLASS_CONFIG[cls] || FC_CLASS_CONFIG.all;
  document.getElementById('fcTopbarTitle').innerHTML =
    cfg.icon + ' ' + cfg.label;
  renderFiles();
}

function setFileFilter(type, btn) {
  fileTypeFilter = type;
  document.querySelectorAll('.fc-type-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderFiles();
}

function getVisibleFiles() {
  const search = (document.getElementById('fileSearch')?.value || '').toLowerCase();
  return (DB.data.filesIndex || []).filter(f => {
    // class filter
    if (fileClassFilter !== 'all' && (f.classGroup || 'common') !== fileClassFilter) return false;
    // For readonly students: only see their class + common
    if (isReadonly && currentRole) {
      const fg = f.classGroup || 'common';
      const userClass = ROLES[currentRole].classFilter;
      if (fg !== 'common' && fg !== userClass) return false;
    }
    // type filter
    if (fileTypeFilter !== 'all' && getFileTypeKey(f.name) !== fileTypeFilter) return false;
    // search
    if (search && !f.name.toLowerCase().includes(search)) return false;
    return true;
  });
}

function updateFcCounts() {
  const files = DB.data.filesIndex || [];
  const countEl = id => document.getElementById('fc-count-' + id);
  const countFor = cls => cls === 'all'
    ? files.length
    : files.filter(f => (f.classGroup || 'common') === cls).length;
  ['all','grade7','grade8','grade9','evening','common'].forEach(cls => {
    const el = countEl(cls); if (el) el.textContent = countFor(cls);
  });
}

  list.innerHTML = files.map(f => {

        '<div class="fc-file-meta">' +
          '<span class="fc-file-size">' + fmtSize(f.size) + '</span>' +
          '<span style="color:var(--border);">·</span>' +
          '<span class="fc-file-date">' + (f.date||f.created_at||'').slice(0,10) + '</span>' +
          '<span style="color:var(--border);">·</span>' +
          '<span class="fc-file-class-tag" style="background:' + tc.bg + ';color:' + tc.color + ';">' + tc.label + '</span>' +
          '<span class="fc-file-class-tag" style="background:rgba(0,0,0,0.05);color:' + cc.color + ';">' + cc.icon + ' ' + cc.label + '</span>' +

  } else if (typeKey === 'img') {
    body.innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:contain;" onerror="this.parentElement.innerHTML='<div class=fc-preview-nopreview><div class=np-icon>🖼️</div><p>图片加载失败，请下载查看</p></div>'">';
  } else {
    body.innerHTML = '<div class="fc-preview-nopreview"><div class="np-icon">📄</div><p>此格式不支持在线预览</p><button class="fc-action-btn primary" style="margin-top:12px;" onclick="downloadFileById('' + id + '')">⬇ 下载查看</button></div>';
  }
  document.getElementById('fcPreviewOverlay').classList.add('show');
}

function closeFcPreview(e) {

  document.getElementById('fcPreviewOverlay').classList.remove('show');
