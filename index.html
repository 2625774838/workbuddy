}

async function downloadFileById(id) {
  const f = (DB.data.filesIndex || []).find(x => x.id === id); if (!f) return;
  const url = SB.fileUrl('files', f.path || f.name);
  const a = document.createElement('a');
  a.href = url; a.download = f.name; a.target = '_blank'; a.click();
}

async function deleteFile(id) {
  if (isReadonly || !confirm('确定删除此文件？')) return;
  const f = (DB.data.filesIndex || []).find(x => x.id === id); if (!f) return;
  // Delete from Supabase Storage
  try {
    await fetch(SUPABASE_URL + '/storage/v1/object/files/' + encodeURIComponent(f.path || f.name), {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
    });
  } catch(e) {}
  DB.data.filesIndex = (DB.data.filesIndex || []).filter(x => x.id !== id);
  await saveData('filesIndex');
  renderFiles(); showToast('已删除', 'success');
}

async function onFileSelect(e) {
  if (isReadonly) return;
  await uploadFilesNew(Array.from(e.target.files || []));
  e.target.value = '';
}

async function uploadFilesNew(files) {
  if (isReadonly) { showToast('只读模式，无法上传', 'warning'); return; }
  if (!files.length) return;

  // Ask which class this batch belongs to
  const classGroup = await pickFileClass();
  if (!classGroup) return; // cancelled

  const progress = document.getElementById('fcUploadProgress');
  const bar      = document.getElementById('fcProgressBar');
  const txt      = document.getElementById('fcProgressText');
  progress.classList.add('show');

  const list = DB.data.filesIndex || [];
  let done = 0;

  for (const file of files) {
    txt.textContent = '上传中 ' + (done+1) + ' / ' + files.length + ' — ' + file.name;
    bar.style.width = Math.round(done / files.length * 100) + '%';
    try {
      const path = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._一-龥-]/g, '_');
      // Use multipart/form-data for better Supabase compatibility
      const formData = new FormData();
      formData.append('', file);
      const res = await fetch(
        SUPABASE_URL + '/storage/v1/object/files/' + encodeURIComponent(path),
        {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'x-upsert': 'true',
          },
          body: file
        }
      );
      if (!res.ok) {
        const errText = await res.text();
        console.error('Upload error:', res.status, errText);
        showToast('上传失败: ' + file.name + ' (' + res.status + ')', 'error');
        done++; continue;
      }
      list.push({
        id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
        name: file.name, size: file.size,
        type: getFileTypeKey(file.name),
        path, classGroup, folderId: null,
        date: new Date().toISOString()
      });
      done++;
    } catch(e) {
      showToast('上传失败: ' + file.name, 'error');
      console.error(e); done++;
    }
  }

  bar.style.width = '100%';
  txt.textContent = '上传完成 ' + done + ' 个文件';
  setTimeout(() => progress.classList.remove('show'), 2000);

  DB.data.filesIndex = list;
  await saveData('filesIndex');
  renderFiles();
  showToast('已上传 ' + done + ' 个文件', 'success');
}

function pickFileClass() {
  return new Promise(resolve => {
    const classes = [

    for(const file of files){

// Lightweight Supabase REST wrapper (no npm needed)
const SB = {
  _h(extra={}) {
    return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json', ...extra };
  },
  async req(method, path, body) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      method, headers: this._h({'Prefer':'return=minimal'}),
      body: body != null ? JSON.stringify(body) : undefined
    });
    if (!res.ok) { const e = await res.text(); throw new Error(res.status + ': ' + e); }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  },
  async select(table, query='') {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + (query?'?'+query:''), {
      headers: this._h()
    });
    if (!res.ok) { const e = await res.text(); throw new Error(res.status + ': ' + e); }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  },
  async upsert(table, data) {
    if (!data || (Array.isArray(data) && !data.length)) return true;
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + table, {
      method: 'POST',
      headers: this._h({'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify(data)
    });
    if (!res.ok) { const e = await res.text(); throw new Error(res.status + ': ' + e); }
    return true;
  },
  // Delete all rows: uses id >= '' for text PKs, or person_id for rollcall
  async deleteAll(table) {
    const filter = table === 'rollcall' ? 'person_id=gte.' : 'id=gte.';
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + filter, {
      method: 'DELETE', headers: this._h({'Prefer':'return=minimal'})
    });
    return res.ok || res.status === 404;
  },
  async uploadFile(bucket, path, file) {
    const res = await fetch(SUPABASE_URL + '/storage/v1/object/' + bucket + '/' + encodeURIComponent(path), {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': file.type||'application/octet-stream', 'x-upsert':'true' },
      body: file
    });
    if (!res.ok) { const e = await res.text(); throw new Error(e); }
    return true;
  },
  fileUrl(bucket, path) {
    return SUPABASE_URL + '/storage/v1/object/public/' + bucket + '/' + encodeURIComponent(path);
  }
};

// Load all data from Supabase on login
async function loadCloudData() {
  showLoadingOverlay(true);
  try {
    const [
      schedules, people, rollcalls, projects,
      notesCats, notesFolders, notesData,
      memos, fileFolders, filesIdx, media, cfgRows
    ] = await Promise.all([
      SB.select('schedules','order=date.asc'),
      SB.select('people','order=class_group.asc,name.asc'),
      SB.select('rollcall','order=date.desc'),
      SB.select('projects','order=created_at.asc'),
      SB.select('notes_cats','order=sort_order.asc'),
      SB.select('notes_folders','order=sort_order.asc'),
      SB.select('notes','order=created_at.asc'),
      SB.select('memos','order=created_at.desc'),
      SB.select('file_folders','order=created_at.asc'),
      SB.select('files_index','order=created_at.desc'),
      SB.select('media','order=created_at.desc'),
      SB.select('config','select=key,value')
    ]);

    // Map to internal format
    DB.data.schedules = (schedules||[]).map(s=>({
      id:s.id, title:s.title, date:s.date, start:s.start_time,
      end:s.end_time, type:s.type||'all', desc:s.note||''
    }));

    DB.data.people = (people||[]).map(p=>({
      id:p.id, name:p.name, group:p.class_group, note:p.note||''
    }));

    // Build rollcall: { date: { personId: { status, note } } }
    DB.data.rollcall = {};
    (rollcalls||[]).forEach(r=>{
      if(!DB.data.rollcall[r.date]) DB.data.rollcall[r.date]={};
      DB.data.rollcall[r.date][r.person_id]={status:r.status||'',note:r.note||''};
    });

    DB.data.projects = (projects||[]).map(p=>({
      id:p.id, name:p.name, start:p.start_date, end:p.end_date,
      color:p.color||'#4f6ef7', desc:p.note||'',
      tasks: Array.isArray(p.tasks)?p.tasks:(typeof p.tasks==='string'?JSON.parse(p.tasks):[])
    }));

    // Build notesCats tree
    const foldersMap = {};
    (notesFolders||[]).forEach(f=>{
      if(!foldersMap[f.cat_id]) foldersMap[f.cat_id]=[];
      foldersMap[f.cat_id].push({...f, notes:[]});
    });
    (notesData||[]).forEach(n=>{
      for(const catId in foldersMap){
        const folder = foldersMap[catId].find(f=>f.id===n.folder_id);
        if(folder){ folder.notes.push({id:n.id,name:n.name,content:n.content||'',createdAt:n.created_at,updatedAt:n.updated_at}); break; }
      }
    });
    DB.data.notesCats = (notesCats||[]).map(c=>({
      id:c.id, name:c.name,
      folders: (foldersMap[c.id]||[]).map(f=>({id:f.id,name:f.name,notes:f.notes||[]}))
    }));
    if(!DB.data.notesCats.length){
      DB.data.notesCats=[{id:'nc_def',name:'默认分类',folders:[{id:'nf_def',name:'默认文件夹',notes:[]}]}];
    }

    DB.data.memos = (memos||[]).map(m=>({
      id:m.id, text:m.text, priority:m.priority||'medium',
      done:!!m.done, dueDate:m.due_date||'', createdAt:m.created_at
    }));

    DB.data.fileFolders = (fileFolders||[]).map(f=>({
      id:f.id, name:f.name, parentId:f.parent_id||null
    }));

    DB.data.filesIndex = (filesIdx||[]).map(f=>({
      id:f.id, name:f.name, size:f.size||0, type:f.type||'other',
      path:f.storage_path||f.name, classGroup:f.folder_id||'common',
      folderId:f.folder_id||null, date:f.created_at
    }));

    DB.data.media = (media||[]).map(m=>({
      id:m.id, name:m.name, type:m.type, size:m.size,
      path:m.storage_path, date:m.created_at
    }));

    // Config: event colors
    const cfgColors = (cfgRows||[]).find(r=>r.key==='event_colors');
    if(cfgColors?.value) {
      DB.config.eventColors = Array.isArray(cfgColors.value)?cfgColors.value:JSON.parse(cfgColors.value);
    }
    calActiveFilters = new Set(DB.eventColors.map(c=>c.key));

    showLoadingOverlay(false);
    renderAll();
    showToast('数据加载完成', 'success');
  } catch(e) {
    showLoadingOverlay(false);
    showToast('数据加载失败: ' + e.message, 'error');
    console.error(e);
  }
}

function showLoadingOverlay(show) {
  let el = document.getElementById('loadingOverlay');
  if(show && !el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(15,17,23,0.7);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:12px;backdrop-filter:blur(4px);';
    el.innerHTML = '<div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:#4f6ef7;border-radius:50%;animation:spin 0.8s linear infinite;"></div><span style="font-size:14px;opacity:0.8;">正在加载数据…</span><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
    document.body.appendChild(el);
  } else if(!show && el) {
    el.remove();
  }
}

    if(m.type==='image') h+='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover;cursor:pointer;" onclick="openLightboxUrl(\''+url+'\')" onerror="this.style.display=\'none\'">';
    else if(m.type==='video') h+='<div class="media-card-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg><span>视频</span></div>';
    else h+='<div class="media-card-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg><span>音频</span></div>';
    h+='<div class="media-card-overlay"><div class="media-card-name">'+escapeHtml(m.name)+'</div><div class="media-card-meta">'+fmtSize(m.size)+'</div></div>';
    h+='<div class="media-card-actions">'+(isReadonly?'':'<button class="btn" onclick="event.stopPropagation();deleteMedia(\''+m.id+'\')">删除</button>')+'</div>';
    h+='</div>';
  });
  h+='</div>';grid.innerHTML=h;
}

function openLightboxUrl(url){
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightbox').style.display='flex';
}

// Override downloadFile to use Supabase Storage
async function downloadFile(id){
  const f=(DB.data.filesIndex||[]).find(x=>x.id===id);if(!f)return;
  const url=SB.fileUrl('files',f.path);
  const a=document.createElement('a');a.href=url;a.download=f.name;a.target='_blank';a.click();
}

async function manualBackup(){ showToast('云端数据自动保存，无需手动备份','success'); }

  const pill=document.getElementById('storagePill');

}

//  PATCH initApp to load from cloud
// ============================================================
const _origInitApp = initApp;
function initApp(){
  // Restore sidebar state
  if(localStorage.getItem('wb_sidebar_collapsed')==='1') toggleSidebar();
  // Restore dark mode
  if(localStorage.getItem('wb_dark')==='1'){
    document.body.classList.add('dark');
    document.getElementById('darkBtn').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  }
  // Init empty data structures
  for(const key of Object.keys(SCHEMA)){if(!DB.data[key])DB.data[key]=JSON.parse(JSON.stringify(SCHEMA[key]));}
  updateStorageBar();
  // Load from Supabase
  loadCloudData();
  window.addEventListener('beforeunload',()=>{ saveCurrentNote(); });
}
